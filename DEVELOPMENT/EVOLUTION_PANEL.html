<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自律AI OS コントロールパネル</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f11; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #00ffcc; text-align: center; font-weight: 300; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #1a1a1d; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h2 { margin-top: 0; font-size: 1.2em; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .task-card { background: #222; margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 4px solid #00ffcc; position: relative; }
        .priority-badge { position: absolute; top: 15px; right: 15px; background: #ff4757; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .task-title { font-size: 1.1em; margin-bottom: 10px; font-weight: 500; width: 80%; }
        .action-plan { color: #888; font-size: 0.9em; margin-bottom: 15px; }
        
        .progress-container { background: #333; width: 100%; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #00ffcc, #3498db); height: 100%; transition: width 0.5s ease; }
        .progress-text { font-size: 0.8em; text-align: right; margin-top: 5px; color: #00ffcc; }
        
        .log-entry { font-size: 0.9em; margin-bottom: 10px; color: #bbb; }
        .log-time { color: #3498db; }
    </style>
</head>
<body>
    <h1>AUTONOMOUS AI OS</h1>
    <div class="grid">
        <div class="panel">
            <h2>🧠 優先タスクキュー (AI_WORK_QUEUE)</h2>
            <div id="queue-list">読み込み中...</div>
        </div>
        <div class="panel">
            <h2>✅ 完了ログ (FINAL_LOG)</h2>
            <div id="final-log">読み込み中...</div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                // キューの読み込み
                const qRes = await fetch('AI_WORK_QUEUE.json');
                const queue = await qRes.json();
                let qHtml = '';
                queue.forEach(task => {
                    if (task.progress >= 100) return; // 完了したものは表示しない
                    
                    let pColor = '#ff4757'; // High
                    if (task.priority < 70) pColor = '#f39c12'; // Med
                    if (task.priority < 40) pColor = '#27ae60'; // Low
                    
                    qHtml += `
                    <div class="task-card" style="border-left-color: ${pColor}">
                        <div class="priority-badge" style="background: ${pColor}">優先度: ${task.priority}</div>
                        <div class="task-title">${task.task}</div>
                        <div class="action-plan">▶ ${task.action_plan}</div>
                        ${task.progress > 0 ? `<div style="margin-bottom:10px;"><a href="output/" target="_blank" style="color:#00ffcc; text-decoration:none; font-size:0.8em;">📂 成果物を確認する</a></div>` : ''}
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${task.progress}%"></div>
                        </div>
                        <div class="progress-text">${task.progress}%</div>
                    </div>`;
                });
                document.getElementById('queue-list').innerHTML = qHtml || "待機中タスクなし";
                
                // ログの読み込み
                const lRes = await fetch('FINAL_LOG.json');
                const logs = await lRes.json();
                let lHtml = '';
                logs.forEach(log => {
                    lHtml += `<div class="log-entry"><span class="log-time">[${log.timestamp.split(' ')[1]}]</span> <strong>${log.task}</strong> - ${log.result}</div>`;
                });
                document.getElementById('final-log').innerHTML = lHtml;
                
            } catch(e) {}
        }
        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>
