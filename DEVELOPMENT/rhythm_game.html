<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Rhythm Training Game</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1b1b22 0%, #0a0a0d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-title {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        #score {
            font-weight: bold;
            color: #bb86fc;
        }
        #judgment {
            font-weight: bold;
            font-size: 24px;
            height: 30px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            transition: all 0.1s ease;
        }
        #board {
            width: 360px;
            height: 500px;
            background: rgba(22, 22, 29, 0.85);
            border: 2px solid #333;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
        }
        .lane {
            width: 90px;
            height: 100%;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            box-sizing: border-box;
        }
        .lane:last-child {
            border-right: none;
        }
        .lane-key {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }
        /* Hit line visual */
        #hit-line {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 6px;
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
            pointer-events: none;
        }
        .note {
            position: absolute;
            width: 80px;
            left: 5px;
            height: 20px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Colored notes so pixel sensors can differentiate from dark lane bg */
        .note-blue {
            background: linear-gradient(to right, #00d4ff, #0088cc);
            box-shadow: 0 0 8px #00d4ff;
        }
        .note-red {
            background: linear-gradient(to right, #ff3366, #cc0033);
            box-shadow: 0 0 8px #ff3366;
        }
        .active-lane {
            background: rgba(0, 212, 255, 0.1) !important;
        }
        #btn-start {
            margin-top: 20px;
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
            transition: all 0.2s;
        }
        #btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>
    <div id="game-title">AI Rhythm Trainer</div>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div id="judgment">READY</div>
    </div>
    
    <div id="board">
        <div class="lane" id="lane-0"><div class="lane-key">D</div></div>
        <div class="lane" id="lane-1"><div class="lane-key">F</div></div>
        <div class="lane" id="lane-2"><div class="lane-key">J</div></div>
        <div class="lane" id="lane-3"><div class="lane-key">K</div></div>
        <div id="hit-line"></div>
    </div>

    <button id="btn-start" onclick="startGame()">START GAME</button>

    <script>
        const laneKeys = ['KeyD', 'KeyF', 'KeyJ', 'KeyK'];
        const laneIds = ['lane-0', 'lane-1', 'lane-2', 'lane-3'];
        let score = 0;
        let gameInterval = null;
        let isPlaying = false;
        
        // Settings
        const noteSpeed = 5; // pixels per frame
        const noteSpawnRate = 800; // ms between spawns
        const hitLineY = 440; // Hit line bottom coordinate relative to board top
        const hitTolerance = 25; // Tolerance window for perfect hit
        
        const activeNotes = [];

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            updateScore(0);
            setJudgment("START!", "#fff");
            document.getElementById('btn-start').innerText = "PLAYING...";
            
            // Loop for spawning notes
            gameInterval = setInterval(spawnNote, noteSpawnRate);
            
            // Frame update loop
            requestAnimationFrame(updateGame);
        }

        function spawnNote() {
            const laneIdx = Math.floor(Math.random() * 4);
            const isRed = Math.random() > 0.5;
            
            const noteEl = document.createElement('div');
            noteEl.className = `note ${isRed ? 'note-red' : 'note-blue'}`;
            noteEl.style.top = '0px';
            document.getElementById(laneIds[laneIdx]).appendChild(noteEl);
            
            activeNotes.push({
                el: noteEl,
                lane: laneIdx,
                y: 0,
                isRed: isRed,
                hit: false
            });
        }

        function updateGame() {
            if (!isPlaying) return;

            for (let i = activeNotes.length - 1; i >= 0; i--) {
                const note = activeNotes[i];
                note.y += noteSpeed;
                note.el.style.top = note.y + 'px';

                // Miss boundary
                if (note.y > hitLineY + hitTolerance + 10) {
                    if (!note.hit) {
                        setJudgment("MISS", "#ff3366");
                    }
                    note.el.remove();
                    activeNotes.splice(i, 1);
                }
            }
            
            requestAnimationFrame(updateGame);
        }

        function triggerHit(laneIdx) {
            // Find closest note in the target lane
            let closestNote = null;
            let minDist = 999;
            let closestIdx = -1;

            for (let i = 0; i < activeNotes.length; i++) {
                const note = activeNotes[i];
                if (note.lane === laneIdx && !note.hit) {
                    const dist = Math.abs(note.y - hitLineY);
                    if (dist < minDist) {
                        minDist = dist;
                        closestNote = note;
                        closestIdx = i;
                    }
                }
            }

            // Light up lane visually
            const laneEl = document.getElementById(laneIds[laneIdx]);
            laneEl.classList.add('active-lane');
            setTimeout(() => laneEl.classList.remove('active-lane'), 100);

            if (closestNote) {
                if (minDist <= hitTolerance) {
                    closestNote.hit = true;
                    updateScore(100);
                    setJudgment("PERFECT", "#00d4ff");
                    closestNote.el.remove();
                    activeNotes.splice(closestIdx, 1);
                } else if (minDist <= hitTolerance * 2) {
                    closestNote.hit = true;
                    updateScore(50);
                    setJudgment("GREAT", "#bb86fc");
                    closestNote.el.remove();
                    activeNotes.splice(closestIdx, 1);
                }
            }
        }

        function updateScore(pts) {
            score += pts;
            document.getElementById('score').innerText = score;
        }

        function setJudgment(txt, color) {
            const el = document.getElementById('judgment');
            el.innerText = txt;
            el.style.color = color;
            el.style.transform = 'scale(1.2)';
            setTimeout(() => el.style.transform = 'scale(1.0)', 80);
        }

        // Listen for keyboard inputs
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            if (e.code === 'KeyD') triggerHit(0);
            if (e.code === 'KeyF') triggerHit(1);
            if (e.code === 'KeyJ') triggerHit(2);
            if (e.code === 'KeyK') triggerHit(3);
            if (e.code === 'Enter') startGame();
        });
    </script>
</body>
</html>
